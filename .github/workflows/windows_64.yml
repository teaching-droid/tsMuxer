name: Build for Windows 64-bit

on:
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v5
      name: checkout

    - name: Set up MSVC (x64)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    - name: Cache Qt6 Windows 7 Build
      id: cache-qt6
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}\qt6-install
        key: qt6-windows7-x64-6.8.3-ninja-p2-${{ hashFiles('.github/workflows/windows_64.yml') }}
        restore-keys: |
          qt6-windows7-x64-6.8.3-ninja-p2-

    - name: Setup Qt6 Windows 7 (Build from source)
      if: steps.cache-qt6.outputs.cache-hit != 'true'
      run: |
        $ErrorActionPreference = "Stop"
        $QT_SRC_ZIP = "${{ runner.temp }}\qt6.zip"
        $QT_PATCH_ZIP = "${{ runner.temp }}\qt6windows7-patches.zip"
        $QT_SRC_PATH = "${{ runner.temp }}\qt6-src"
        $QT_BUILD_PATH = "${{ runner.temp }}\qt6-build"
        $QT_INSTALL_PATH = "${{ runner.temp }}\qt6-install"

        if (Test-Path "$QT_INSTALL_PATH\bin\moc.exe") {
          Write-Host "Qt already present (restored from cache), skipping the 40-minute rebuild."
          exit 0
        }

        Write-Host "Downloading official Qt6 source..."
        $QT_SRC_URL = "https://github.com/qt/qtbase/archive/refs/tags/v6.8.3.zip"
        Invoke-WebRequest -Uri $QT_SRC_URL -OutFile $QT_SRC_ZIP

        Write-Host "Downloading qt6windows7 patches..."
        $QT_PATCH_URL = "https://github.com/crystalidea/qt6windows7/archive/refs/tags/v6.8.3.zip"
        Invoke-WebRequest -Uri $QT_PATCH_URL -OutFile $QT_PATCH_ZIP

        Write-Host "Extracting Qt6 source..."
        Expand-Archive -Path $QT_SRC_ZIP -DestinationPath "${{ runner.temp }}" -Force
        Rename-Item -Path "${{ runner.temp }}\qtbase-6.8.3" -NewName $QT_SRC_PATH -Force

        Write-Host "Extracting qt6windows7 patches..."
        $QT_PATCH_EXTRACT = "${{ runner.temp }}\qt6windows7-patches"
        Expand-Archive -Path $QT_PATCH_ZIP -DestinationPath $QT_PATCH_EXTRACT -Force

        Write-Host "Applying qt6windows7 patches..."
        $PatchSrcPath = "$QT_PATCH_EXTRACT\qt6windows7-6.8.3\qtbase\src"
        $QtSrcPath = "$QT_SRC_PATH\src"
        Write-Host "Patch source: $PatchSrcPath"
        Write-Host "Qt destination: $QtSrcPath"
        Get-ChildItem -Path $PatchSrcPath -Recurse | ForEach-Object {
          $RelativePath = $_.FullName.Substring($PatchSrcPath.Length + 1)
          $DestPath = Join-Path $QtSrcPath $RelativePath
          if ($_.PSIsContainer) {
            if (!(Test-Path $DestPath)) { mkdir $DestPath | Out-Null }
          } else {
            Copy-Item -Path $_.FullName -Destination $DestPath -Force
          }
        }
        Write-Host "Patches applied successfully"

        Write-Host "Creating build directory..."
        mkdir $QT_BUILD_PATH
        mkdir $QT_INSTALL_PATH

        # Qt must be built with a single-config generator (Ninja); the Visual Studio
        # multi-config generator rejects Qt's per-configuration EXCLUDE_FROM_ALL targets.
        Write-Host "Configuring Qt6 build (64-bit, Ninja)..."
        cd $QT_BUILD_PATH
        cmake "$QT_SRC_PATH" `
          -G Ninja `
          -DCMAKE_INSTALL_PREFIX="$QT_INSTALL_PATH" `
          -DCMAKE_BUILD_TYPE=Release `
          -DQT_BUILD_EXAMPLES=OFF `
          -DQT_BUILD_TESTS=OFF `
          -DQT_BUILD_DOCUMENTATION=OFF `
          -DFEATURE_tracepointgen=OFF `
          -DFEATURE_sql_psql=OFF `
          -DFEATURE_sql_mysql=OFF
        if ($LASTEXITCODE -ne 0) { throw "Qt configure failed" }

        Write-Host "Building Qt6 (this may take 30+ minutes)..."
        cmake --build .
        if ($LASTEXITCODE -ne 0) { throw "Qt build failed" }

        Write-Host "Installing Qt6..."
        cmake --install .
        if ($LASTEXITCODE -ne 0) { throw "Qt install failed" }

        Write-Host "Qt6 with Windows 7 patches build complete!"

    - name: Build Qt6 qttools (LinguistTools)
      run: |
        $ErrorActionPreference = "Stop"
        $QT_INSTALL_PATH = "${{ runner.temp }}\qt6-install"
        if (Test-Path "$QT_INSTALL_PATH\bin\lrelease.exe") {
          Write-Host "qttools already present (from cache), skipping."
          exit 0
        }
        $TT_SRC = "${{ runner.temp }}\qttools-src"
        $TT_BUILD = "${{ runner.temp }}\qttools-build"
        Write-Host "Downloading qttools source..."
        Invoke-WebRequest -Uri "https://github.com/qt/qttools/archive/refs/tags/v6.8.3.zip" -OutFile "${{ runner.temp }}\qttools.zip"
        Expand-Archive -Path "${{ runner.temp }}\qttools.zip" -DestinationPath "${{ runner.temp }}" -Force
        Rename-Item -Path "${{ runner.temp }}\qttools-6.8.3" -NewName $TT_SRC -Force
        # qtbase only provides Widgets/Core/Gui; the GUI's translations need lrelease from qttools.
        cmake -S $TT_SRC -B $TT_BUILD -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="$QT_INSTALL_PATH" `
          -DCMAKE_INSTALL_PREFIX="$QT_INSTALL_PATH" `
          -DQT_BUILD_EXAMPLES=OFF `
          -DQT_BUILD_TESTS=OFF `
          -DFEATURE_designer=OFF `
          -DFEATURE_assistant=OFF `
          -DFEATURE_qdoc=OFF
        if ($LASTEXITCODE -ne 0) { throw "qttools configure failed" }
        cmake --build $TT_BUILD
        if ($LASTEXITCODE -ne 0) { throw "qttools build failed" }
        cmake --install $TT_BUILD
        if ($LASTEXITCODE -ne 0) { throw "qttools install failed" }

    - name: Build zlib (static)
      run: |
        $ErrorActionPreference = "Stop"
        $ZSRC = "${{ runner.temp }}\zlib-src"
        $ZBUILD = "${{ runner.temp }}\zlib-build"
        $ZINST = "${{ runner.temp }}\zlib-install"
        git clone --depth 1 --branch v1.3.1 https://github.com/madler/zlib.git "$ZSRC"
        if ($LASTEXITCODE -ne 0) { throw "zlib clone failed" }
        cmake -S "$ZSRC" -B "$ZBUILD" -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$ZINST"
        if ($LASTEXITCODE -ne 0) { throw "zlib configure failed" }
        cmake --build "$ZBUILD"
        if ($LASTEXITCODE -ne 0) { throw "zlib build failed" }
        cmake --install "$ZBUILD"
        if ($LASTEXITCODE -ne 0) { throw "zlib install failed" }

    - name: Build tsMuxer
      run: |
        $ErrorActionPreference = "Stop"
        $QT_INSTALL_PATH = "${{ runner.temp }}\qt6-install"
        $ZINST = "${{ runner.temp }}\zlib-install"

        mkdir build
        cd build
        cmake ../ `
          -G Ninja `
          -DCMAKE_PREFIX_PATH="$QT_INSTALL_PATH" `
          -DZLIB_INCLUDE_DIR="$ZINST\include" `
          -DZLIB_LIBRARY="$ZINST\lib\zlibstatic.lib" `
          -DTSMUXER_GUI=ON `
          -DCMAKE_BUILD_TYPE=Release
        if ($LASTEXITCODE -ne 0) { throw "tsMuxer configure failed" }
        cmake --build .
        if ($LASTEXITCODE -ne 0) { throw "tsMuxer build failed" }

        if (!(Test-Path "../bin")) { mkdir "../bin" }
        Copy-Item -Path "tsMuxer/tsmuxer.exe" -Destination "../bin/tsMuxeR.exe" -Force
        if (Test-Path "tsMuxerGUI/tsmuxergui.exe") {
          Copy-Item -Path "tsMuxerGUI/tsmuxergui.exe" -Destination "../bin/tsMuxerGUI.exe" -Force
          # Qt is a shared build here, so gather the Windows 7 patched Qt DLLs and plugins next to the GUI.
          & "$QT_INSTALL_PATH\bin\windeployqt.exe" --release --no-translations --no-system-d3d-compiler --no-opengl-sw --no-compiler-runtime "../bin/tsMuxerGUI.exe"
          if ($LASTEXITCODE -ne 0) { throw "windeployqt failed" }
          # A QWidget app never loads the Direct3D shader compiler; drop it (large, Windows 10 oriented).
          Remove-Item "../bin/dxcompiler.dll","../bin/dxil.dll","../bin/vc_redist.x64.exe" -Force -ErrorAction SilentlyContinue
          # Bundle the actual VC++ runtime DLLs so the package is portable (no installer needed).
          $crt = Get-ChildItem "$env:VCToolsRedistDir\x64" -Filter "Microsoft.VC*.CRT" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $crt) { $crt = Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "Microsoft.VC*.CRT" -Directory -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match '\\x64\\' } | Select-Object -First 1 }
          if ($crt) { Copy-Item "$($crt.FullName)\*.dll" "../bin/" -Force }
          # Bundle the Universal CRT so a bare Windows 7 runs with nothing installed.
          $ucrt = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Redist" -Recurse -Filter ucrtbase.dll -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match '\\x64\\' } | Select-Object -First 1
          if ($ucrt) { Copy-Item (Join-Path $ucrt.DirectoryName '*.dll') "../bin/" -Force }
          # Replace the Qt runtime with the crystalidea qt6windows7 PREBUILT Windows 7 DLLs (same Qt
          # 6.8.3 / MSVC, binary compatible). Building qtbase from the patched source is still needed
          # above for moc/headers/libs, but its Qt6Core.dll and qwindows.dll come out with a WinRT
          # (Windows 8+) import, so the GUI cannot start on Windows 7; the prebuilt runtime is
          # WinRT-free and Windows 7 proven. Only files we already ship are overwritten.
          $w7zip = "${{ runner.temp }}\qt6win7-runtime.7z"
          $w7dir = "${{ runner.temp }}\qt6win7-runtime"
          Invoke-WebRequest -Uri "https://github.com/crystalidea/qt6windows7/releases/download/v6.8.3/qt6_x64_to_run_on_windows7.7z" -OutFile $w7zip
          7z x $w7zip "-o$w7dir" -y | Out-Null
          # Swap Qt files only. The VC++/UCRT runtime stays the fresh one bundled above: our
          # executables are built with the newest toolset and need it, and a newer CRT runs the
          # prebuilt Qt fine, while the prebuilt package's older msvcp140 might miss exports.
          $replaced = 0
          Get-ChildItem -Recurse "../bin" -Filter "*.dll" | ForEach-Object {
            $rel = [System.IO.Path]::GetRelativePath((Resolve-Path "../bin"), $_.FullName)
            if ($rel -notmatch '^(Qt6[^\\]*\.dll$|platforms\\|styles\\|imageformats\\|generic\\|tls\\)') { return }
            $src = Join-Path $w7dir $rel
            if (Test-Path $src) { Copy-Item $src $_.FullName -Force; $replaced++ }
          }
          Write-Host "Replaced $replaced Qt runtime files with the Windows 7 prebuilt ones."
          if ($replaced -lt 5) { throw "Windows 7 runtime swap failed: only $replaced files replaced (expected Qt6Core/Gui/Widgets/Network + qwindows at least)." }
          # This optional plugin imports WinRT and has no Windows 7 build; Qt runs fine without it
          # (it only provides network change notifications).
          Remove-Item "../bin/networkinformation" -Recurse -Force -ErrorAction SilentlyContinue
          # Windows 7 guard: nothing the loader touches may import the WinRT API set
          # (api-ms-win-core-winrt-l1-1-0.dll is Windows 8+), or the GUI cannot start on Windows 7.
          $winrtHit = @()
          foreach ($dll in @("../bin/Qt6Core.dll","../bin/Qt6Gui.dll","../bin/Qt6Widgets.dll","../bin/Qt6Network.dll","../bin/platforms/qwindows.dll")) {
            if (Test-Path $dll) {
              $ascii = [System.Text.Encoding]::ASCII.GetString([System.IO.File]::ReadAllBytes((Resolve-Path $dll)))
              if ($ascii -match "api-ms-win-core-winrt-l1-1-0\.dll") { $winrtHit += $dll }
            }
          }
          if ($winrtHit.Count -gt 0) { throw "Windows 7 check FAILED: WinRT (Win8+) import found in: $($winrtHit -join ', ')." }
          Write-Host "Windows 7 check passed: the shipped Qt runtime is WinRT-free."
        }
        cd ..

    - name: Package Build
      run: |
        $ver = $env:GITHUB_REF_NAME -replace '^v',''
        $asset = "tsMuxeR-$ver-windows-x64.zip"
        Add-Content -Path $env:GITHUB_ENV -Value "ASSET=$asset"
        cd bin
        if (Test-Path "tsMuxerGUI.exe") {
          7z a -y "..\$asset" *
          Move-Item "..\$asset" ".\$asset" -Force
        } else {
          7z a -y "$asset" tsMuxeR.exe
        }

    - uses: actions/upload-artifact@v4
      with:
        name: tsMuxer-w64
        path: bin/${{ env.ASSET }}
      name: upload-artifact

    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/${{ env.ASSET }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
