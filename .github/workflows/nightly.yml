name: Nightly Releases

on:
  schedule:
    - cron:  '1 1 * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    
    outputs:
      status: ${{ steps.check.outputs.status }}
      version: ${{ steps.check.outputs.version }}
      skip_reason: ${{ steps.check.outputs.skip_reason }}
    
    steps:
    - uses: actions/checkout@v4
      name: checkout
      with:
        fetch-depth: 0
    
    - name: nightly-check
      id: check
      shell: bash {0}
      run: |
        set -e
        
        # Check if HEAD already has a nightly tag
        if git describe --tags --contains --match 'nightly-*' HEAD >/dev/null 2>&1; then
          # HEAD already tagged, skip build
          echo "status=1" >> $GITHUB_OUTPUT
          echo "skip_reason=HEAD already has nightly tag" >> $GITHUB_OUTPUT
          echo "::notice::Skipping nightly build - HEAD already has nightly tag"
          exit 0
        else
          # New code since last nightly, proceed with build
          ver="$(date +%Y-%m-%d-%H-%M-%S)"
          echo "status=0" >> $GITHUB_OUTPUT
          echo "version=${ver}" >> $GITHUB_OUTPUT
          echo "skip_reason=" >> $GITHUB_OUTPUT
          echo "::notice::Building nightly for version: ${ver}"
          exit 0
        fi

    - name: create-release
      id: create
      if: steps.check.outputs.status == 0
      uses: softprops/action-gh-release@v2
      with:
        tag_name: nightly-${{ steps.check.outputs.version }}
        name: Nightly build from ${{ steps.check.outputs.version }}
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Log workflow status
      if: always()
      run: |
        if [ "${{ steps.check.outputs.status }}" == "0" ]; then
          echo "::notice::Nightly check passed, proceeding to build"
        else
          echo "::notice::Nightly check skipped: ${{ steps.check.outputs.skip_reason }}"
        fi
  
  build-linux:
    needs: check
    if: needs.check.outputs.status == 0
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      name: checkout

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libfreetype-dev zlib1g-dev
      
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.*'
        modules: 'qtmultimedia'
      
    - run: ./scripts/rebuild_linux_with_gui.sh
      name: build-for-linux

    - name: Upload Linux Build
      uses: softprops/action-gh-release@v2
      with:
        files: ./bin/lnx.zip
        tag_name: nightly-${{ needs.check.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: check
    if: needs.check.outputs.status == 0
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: "x86_64"
            artifact: "w64.zip"
            cache_path: "${{ runner.temp }}\\qt6-install"
            cache_key: "qt6-windows7-x64-6.8.3"
            cmake_args: ""
          - arch: "x86"
            artifact: "w32.zip"
            cache_path: "${{ runner.temp }}\\qt6-install-x86"
            cache_key: "qt6-windows7-x86-6.8.3"
            cmake_args: "-A Win32"
    
    steps:
    - uses: actions/checkout@v4
      name: checkout

    - name: Cache Qt6 Windows 7 Build
      id: cache-qt6
      uses: actions/cache@v4
      with:
        path: ${{ matrix.cache_path }}
        key: ${{ matrix.cache_key }}-${{ hashFiles('.github/workflows/nightly.yml') }}
        restore-keys: |
          ${{ matrix.cache_key }}-

    - name: Setup Qt6 Windows 7 (Build from source)
      if: steps.cache-qt6.outputs.cache-hit != 'true'
      run: |
        $QT_SRC_ZIP = "${{ runner.temp }}\qt6.zip"
        $QT_PATCH_ZIP = "${{ runner.temp }}\qt6windows7-patches.zip"
        $QT_SRC_PATH = "${{ runner.temp }}\qt6-src-${{ matrix.arch }}"
        $QT_BUILD_PATH = "${{ runner.temp }}\qt6-build-${{ matrix.arch }}"
        $QT_INSTALL_PATH = "${{ matrix.cache_path }}"
        
        Write-Host "Downloading official Qt6 source..."
        $QT_SRC_URL = "https://github.com/qt/qtbase/archive/refs/tags/v6.8.3.zip"
        Invoke-WebRequest -Uri $QT_SRC_URL -OutFile $QT_SRC_ZIP
        
        Write-Host "Downloading qt6windows7 patches..."
        $QT_PATCH_URL = "https://github.com/crystalidea/qt6windows7/archive/refs/tags/v6.8.3.zip"
        Invoke-WebRequest -Uri $QT_PATCH_ZIP -OutFile $QT_PATCH_ZIP
        
        Write-Host "Extracting Qt6 source..."
        Expand-Archive -Path $QT_SRC_ZIP -DestinationPath "${{ runner.temp }}" -Force
        Rename-Item -Path "${{ runner.temp }}\qtbase-6.8.3" -NewName $QT_SRC_PATH -Force
        
        Write-Host "Extracting qt6windows7 patches..."
        $QT_PATCH_EXTRACT = "${{ runner.temp }}\qt6windows7-patches-${{ matrix.arch }}"
        Expand-Archive -Path $QT_PATCH_ZIP -DestinationPath $QT_PATCH_EXTRACT -Force
        
        Write-Host "Applying qt6windows7 patches..."
        $PatchSrcPath = "$QT_PATCH_EXTRACT\qt6windows7-6.8.3\qtbase\src"
        $QtSrcPath = "$QT_SRC_PATH\src"
        Write-Host "Patch source: $PatchSrcPath"
        Write-Host "Qt destination: $QtSrcPath"
        Get-ChildItem -Path $PatchSrcPath -Recurse | ForEach-Object {
          $RelativePath = $_.FullName.Substring($PatchSrcPath.Length + 1)
          $DestPath = Join-Path $QtSrcPath $RelativePath
          if ($_.PSIsContainer) {
            if (!(Test-Path $DestPath)) { mkdir $DestPath | Out-Null }
          } else {
            Copy-Item -Path $_.FullName -Destination $DestPath -Force
          }
        }
        Write-Host "Patches applied successfully"
        
        Write-Host "Creating build directory..."
        mkdir $QT_BUILD_PATH
        mkdir $QT_INSTALL_PATH
        
        Write-Host "Configuring Qt6 build (${{ matrix.arch }})..."
        cd $QT_BUILD_PATH
        $cmake_cmd = "cmake `"$QT_SRC_PATH`" -DCMAKE_INSTALL_PREFIX=`"$QT_INSTALL_PATH`" -DCMAKE_BUILD_TYPE=Release -DQT_BUILD_EXAMPLES=OFF -DQT_BUILD_TESTS=OFF -DFEATURE_static_runtime=ON"
        if ("${{ matrix.arch }}" -eq "x86") {
          $cmake_cmd = "cmake `"$QT_SRC_PATH`" -A Win32 -DCMAKE_INSTALL_PREFIX=`"$QT_INSTALL_PATH`" -DCMAKE_BUILD_TYPE=Release -DQT_BUILD_EXAMPLES=OFF -DQT_BUILD_TESTS=OFF -DFEATURE_static_runtime=ON"
        }
        Invoke-Expression $cmake_cmd
        
        Write-Host "Building Qt6 (${{ matrix.arch }}) (this may take 30+ minutes)..."
        cmake --build . --config Release -j ([Environment]::ProcessorCount)
        
        Write-Host "Installing Qt6..."
        cmake --install . --config Release
        
        Write-Host "Qt6 ${{ matrix.arch }} with Windows 7 patches build complete!"

    - name: Build tsMuxer
      run: |
        $QT_INSTALL_PATH = "${{ matrix.cache_path }}"
        
        mkdir build
        cd build
        $cmake_cmd = "cmake ../ -DCMAKE_PREFIX_PATH=`"$QT_INSTALL_PATH`" -DTSMUXER_GUI=ON -DCMAKE_BUILD_TYPE=Release"
        if ("${{ matrix.arch }}" -eq "x86") {
          $cmake_cmd = "cmake ../ -A Win32 -DCMAKE_PREFIX_PATH=`"$QT_INSTALL_PATH`" -DTSMUXER_GUI=ON -DCMAKE_BUILD_TYPE=Release"
        }
        Invoke-Expression $cmake_cmd
        cmake --build . --config Release
        
        if (!(Test-Path "../bin")) { mkdir "../bin" }
        Copy-Item -Path "tsMuxer/Release/tsmuxer.exe" -Destination "../bin/tsMuxeR.exe" -Force
        if (Test-Path "tsMuxerGUI/Release/tsmuxergui.exe") {
          Copy-Item -Path "tsMuxerGUI/Release/tsmuxergui.exe" -Destination "../bin/tsMuxerGUI.exe" -Force
        }
        cd ..

    - name: Package Build
      run: |
        cd bin
        if (Test-Path "tsMuxerGUI.exe") {
          7z a -y ${{ matrix.artifact }} tsMuxeR.exe tsMuxerGUI.exe
        } else {
          7z a -y ${{ matrix.artifact }} tsMuxeR.exe
        }

    - name: Upload Windows Build
      uses: softprops/action-gh-release@v2
      with:
        files: ./bin/${{ matrix.artifact }}
        tag_name: nightly-${{ needs.check.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: check
    if: needs.check.outputs.status == 0
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
          - arch: x86_64
    
    steps:
    - uses: actions/checkout@v4
      name: checkout
      
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.*'
        modules: 'qtmultimedia'
      
    - run: ./scripts/build_macos_native.sh
      name: build-for-mac
      env:
        CMAKE_OSX_ARCHITECTURES: ${{ matrix.arch }}

    - name: Rename zip with architecture
      run: mv build/bin/mac.zip build/bin/mac-${{ matrix.arch }}.zip

    - name: Upload macOS Build
      uses: softprops/action-gh-release@v2
      with:
        files: build/bin/mac-${{ matrix.arch }}.zip
        tag_name: nightly-${{ needs.check.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        
