name: Nightly Releases

on:
  schedule:
    - cron:  '1 1 * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    
    outputs:
      status: ${{ steps.check.outputs.status }}
      version: ${{ steps.check.outputs.version }}
      skip_reason: ${{ steps.check.outputs.skip_reason }}
    
    steps:
    - uses: actions/checkout@v4
      name: checkout
      with:
        fetch-depth: 0
    
    - name: nightly-check
      id: check
      shell: bash {0}
      run: |
        set -e
        
        # Check if HEAD already has a nightly tag
        if git describe --tags --contains --match 'nightly-*' HEAD >/dev/null 2>&1; then
          # HEAD already tagged, skip build
          echo "status=1" >> $GITHUB_OUTPUT
          echo "skip_reason=HEAD already has nightly tag" >> $GITHUB_OUTPUT
          echo "::notice::Skipping nightly build - HEAD already has nightly tag"
          exit 0
        else
          # New code since last nightly, proceed with build
          ver="$(date +%Y-%m-%d-%H-%M-%S)"
          echo "status=0" >> $GITHUB_OUTPUT
          echo "version=${ver}" >> $GITHUB_OUTPUT
          echo "skip_reason=" >> $GITHUB_OUTPUT
          echo "::notice::Building nightly for version: ${ver}"
          exit 0
        fi

    - name: create-release
      id: create
      if: steps.check.outputs.status == 0
      uses: softprops/action-gh-release@v2
      with:
        tag_name: nightly-${{ steps.check.outputs.version }}
        name: Nightly build from ${{ steps.check.outputs.version }}
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Log workflow status
      if: always()
      run: |
        if [ "${{ steps.check.outputs.status }}" == "0" ]; then
          echo "::notice::Nightly check passed, proceeding to build"
        else
          echo "::notice::Nightly check skipped: ${{ steps.check.outputs.skip_reason }}"
        fi
  
  build-linux:
    needs: check
    if: needs.check.outputs.status == 0
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      name: checkout

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libfreetype-dev zlib1g-dev
      
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.*'
        modules: 'qtmultimedia'
      
    - run: ./scripts/rebuild_linux_with_gui.sh
      name: build-for-linux

    - name: Upload Linux Build
      uses: softprops/action-gh-release@v2
      with:
        files: ./bin/lnx.zip
        tag_name: nightly-${{ needs.check.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: check
    if: needs.check.outputs.status == 0
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: "x86_64"
            artifact: "w64.zip"
            qt_url: "https://github.com/crystalidea/qt6windows7/releases/download/6.8.3/qt-6.8.3-win64-msvc2022-static.zip"
          - arch: "x86"
            artifact: "w32.zip"
            qt_url: "https://github.com/crystalidea/qt6windows7/releases/download/6.8.3/qt-6.8.3-win32-msvc2022-static.zip"
    
    steps:
    - uses: actions/checkout@v4
      name: checkout

    - name: Setup Qt6 Windows 7 (Qt6windows7)
      run: |
        $QT_ZIP = "${{ runner.temp }}\qt6.zip"
        $QT_PATH = "${{ runner.temp }}\qt6windows7"
        
        Write-Host "Downloading Qt6 Windows 7 compatible binaries..."
        Invoke-WebRequest -Uri "${{ matrix.qt_url }}" -OutFile $QT_ZIP
        
        Write-Host "Extracting Qt6 binaries..."
        Expand-Archive -Path $QT_ZIP -DestinationPath $QT_PATH -Force
        
        Write-Host "Qt6 path: $QT_PATH"
        Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_PREFIX_PATH=$QT_PATH"

    - name: Build tsMuxer
      run: |
        mkdir build
        cd build
        if ("${{ matrix.arch }}" -eq "x86") {
          cmake ../ -A Win32 -DCMAKE_PREFIX_PATH="${{ env.CMAKE_PREFIX_PATH }}" -DTSMUXER_GUI=ON -DCMAKE_BUILD_TYPE=Release
        } else {
          cmake ../ -DCMAKE_PREFIX_PATH="${{ env.CMAKE_PREFIX_PATH }}" -DTSMUXER_GUI=ON -DCMAKE_BUILD_TYPE=Release
        }
        cmake --build . --config Release
        
        mkdir -p ../bin
        Copy-Item -Path "tsMuxer/Release/tsmuxer.exe" -Destination "../bin/tsMuxeR.exe" -Force
        if (Test-Path "tsMuxerGUI/Release/tsmuxergui.exe") {
          Copy-Item -Path "tsMuxerGUI/Release/tsmuxergui.exe" -Destination "../bin/tsMuxerGUI.exe" -Force
        }
        cd ..

    - name: Package Build
      run: |
        cd bin
        if (Test-Path "tsMuxerGUI.exe") {
          7z a -y ${{ matrix.artifact }} tsMuxeR.exe tsMuxerGUI.exe
        } else {
          7z a -y ${{ matrix.artifact }} tsMuxeR.exe
        }

    - name: Upload Windows Build
      uses: softprops/action-gh-release@v2
      with:
        files: ./bin/${{ matrix.artifact }}
        tag_name: nightly-${{ needs.check.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: check
    if: needs.check.outputs.status == 0
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
          - arch: x86_64
    
    steps:
    - uses: actions/checkout@v4
      name: checkout
      
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.*'
        modules: 'qtmultimedia'
      
    - run: ./scripts/build_macos_native.sh
      name: build-for-mac
      env:
        CMAKE_OSX_ARCHITECTURES: ${{ matrix.arch }}

    - name: Rename zip with architecture
      run: mv build/bin/mac.zip build/bin/mac-${{ matrix.arch }}.zip

    - name: Upload macOS Build
      uses: softprops/action-gh-release@v2
      with:
        files: build/bin/mac-${{ matrix.arch }}.zip
        tag_name: nightly-${{ needs.check.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        
