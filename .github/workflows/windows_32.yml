name: Build for Windows 32-bit

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4
      name: checkout

    - name: Set up MSVC (x86)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64_x86

    - name: Cache Qt6 Windows 7 Build
      id: cache-qt6
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}\qt6-install-x86
        key: qt6-windows7-x86-6.8.3-ninja-${{ hashFiles('.github/workflows/windows_32.yml') }}
        restore-keys: |
          qt6-windows7-x86-6.8.3-ninja-

    - name: Setup Qt6 Windows 7 (Build from source)
      if: steps.cache-qt6.outputs.cache-hit != 'true'
      run: |
        $ErrorActionPreference = "Stop"
        $QT_SRC_ZIP = "${{ runner.temp }}\qt6.zip"
        $QT_PATCH_ZIP = "${{ runner.temp }}\qt6windows7-patches.zip"
        $QT_SRC_PATH = "${{ runner.temp }}\qt6-src-x86"
        $QT_BUILD_PATH = "${{ runner.temp }}\qt6-build-x86"
        $QT_INSTALL_PATH = "${{ runner.temp }}\qt6-install-x86"

        if (Test-Path "$QT_INSTALL_PATH\bin\moc.exe") {
          Write-Host "Qt already present (restored from cache), skipping the 40-minute rebuild."
          exit 0
        }

        Write-Host "Downloading official Qt6 source..."
        $QT_SRC_URL = "https://github.com/qt/qtbase/archive/refs/tags/v6.8.3.zip"
        Invoke-WebRequest -Uri $QT_SRC_URL -OutFile $QT_SRC_ZIP

        Write-Host "Downloading qt6windows7 patches..."
        $QT_PATCH_URL = "https://github.com/crystalidea/qt6windows7/archive/refs/tags/v6.8.3.zip"
        Invoke-WebRequest -Uri $QT_PATCH_URL -OutFile $QT_PATCH_ZIP

        Write-Host "Extracting Qt6 source..."
        Expand-Archive -Path $QT_SRC_ZIP -DestinationPath "${{ runner.temp }}" -Force
        Rename-Item -Path "${{ runner.temp }}\qtbase-6.8.3" -NewName $QT_SRC_PATH -Force

        Write-Host "Extracting qt6windows7 patches..."
        $QT_PATCH_EXTRACT = "${{ runner.temp }}\qt6windows7-patches"
        Expand-Archive -Path $QT_PATCH_ZIP -DestinationPath $QT_PATCH_EXTRACT -Force

        Write-Host "Applying qt6windows7 patches..."
        $PatchSrcPath = "$QT_PATCH_EXTRACT\qt6windows7-6.8.3\qtbase\src"
        $QtSrcPath = "$QT_SRC_PATH\src"
        Write-Host "Patch source: $PatchSrcPath"
        Write-Host "Qt destination: $QtSrcPath"
        Get-ChildItem -Path $PatchSrcPath -Recurse | ForEach-Object {
          $RelativePath = $_.FullName.Substring($PatchSrcPath.Length + 1)
          $DestPath = Join-Path $QtSrcPath $RelativePath
          if ($_.PSIsContainer) {
            if (!(Test-Path $DestPath)) { mkdir $DestPath | Out-Null }
          } else {
            Copy-Item -Path $_.FullName -Destination $DestPath -Force
          }
        }
        Write-Host "Patches applied successfully"

        Write-Host "Creating build directory..."
        mkdir $QT_BUILD_PATH
        mkdir $QT_INSTALL_PATH

        # Qt must be built with a single-config generator (Ninja); the Visual Studio
        # multi-config generator rejects Qt's per-configuration EXCLUDE_FROM_ALL targets.
        # The msvc-dev-cmd step above put the x86 cl.exe on PATH so Ninja builds 32-bit.
        Write-Host "Configuring Qt6 build (32-bit, Ninja)..."
        cd $QT_BUILD_PATH
        cmake "$QT_SRC_PATH" `
          -G Ninja `
          -DCMAKE_INSTALL_PREFIX="$QT_INSTALL_PATH" `
          -DCMAKE_BUILD_TYPE=Release `
          -DQT_BUILD_EXAMPLES=OFF `
          -DQT_BUILD_TESTS=OFF `
          -DQT_BUILD_DOCUMENTATION=OFF `
          -DFEATURE_tracepointgen=OFF `
          -DFEATURE_sql_psql=OFF `
          -DFEATURE_sql_mysql=OFF
        if ($LASTEXITCODE -ne 0) { throw "Qt configure failed" }

        Write-Host "Building Qt6 32-bit (this may take 30+ minutes)..."
        cmake --build .
        if ($LASTEXITCODE -ne 0) { throw "Qt build failed" }

        Write-Host "Installing Qt6..."
        cmake --install .
        if ($LASTEXITCODE -ne 0) { throw "Qt install failed" }

        Write-Host "Qt6 32-bit with Windows 7 patches build complete!"

    - name: Build Qt6 qttools (LinguistTools, x86)
      run: |
        $ErrorActionPreference = "Stop"
        $QT_INSTALL_PATH = "${{ runner.temp }}\qt6-install-x86"
        if (Test-Path "$QT_INSTALL_PATH\bin\lrelease.exe") {
          Write-Host "qttools already present (from cache), skipping."
          exit 0
        }
        $TT_SRC = "${{ runner.temp }}\qttools-src-x86"
        $TT_BUILD = "${{ runner.temp }}\qttools-build-x86"
        Write-Host "Downloading qttools source..."
        Invoke-WebRequest -Uri "https://github.com/qt/qttools/archive/refs/tags/v6.8.3.zip" -OutFile "${{ runner.temp }}\qttools.zip"
        Expand-Archive -Path "${{ runner.temp }}\qttools.zip" -DestinationPath "${{ runner.temp }}" -Force
        Rename-Item -Path "${{ runner.temp }}\qttools-6.8.3" -NewName $TT_SRC -Force
        cmake -S $TT_SRC -B $TT_BUILD -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="$QT_INSTALL_PATH" `
          -DCMAKE_INSTALL_PREFIX="$QT_INSTALL_PATH" `
          -DQT_BUILD_EXAMPLES=OFF `
          -DQT_BUILD_TESTS=OFF `
          -DFEATURE_designer=OFF `
          -DFEATURE_assistant=OFF `
          -DFEATURE_qdoc=OFF
        if ($LASTEXITCODE -ne 0) { throw "qttools configure failed" }
        cmake --build $TT_BUILD
        if ($LASTEXITCODE -ne 0) { throw "qttools build failed" }
        cmake --install $TT_BUILD
        if ($LASTEXITCODE -ne 0) { throw "qttools install failed" }

    - name: Build zlib (static, x86)
      run: |
        $ErrorActionPreference = "Stop"
        $ZSRC = "${{ runner.temp }}\zlib-src-x86"
        $ZBUILD = "${{ runner.temp }}\zlib-build-x86"
        $ZINST = "${{ runner.temp }}\zlib-install-x86"
        git clone --depth 1 --branch v1.3.1 https://github.com/madler/zlib.git $ZSRC
        if ($LASTEXITCODE -ne 0) { throw "zlib clone failed" }
        cmake -S $ZSRC -B $ZBUILD -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$ZINST
        if ($LASTEXITCODE -ne 0) { throw "zlib configure failed" }
        cmake --build $ZBUILD
        if ($LASTEXITCODE -ne 0) { throw "zlib build failed" }
        cmake --install $ZBUILD
        if ($LASTEXITCODE -ne 0) { throw "zlib install failed" }
        # zlib's CMake names the static lib libzs.lib (not zlibstatic.lib); normalize it to a known name.
        $static = Get-ChildItem "$ZINST\lib\*.lib" | Where-Object { $_.Name -match 'zs|static' } | Select-Object -First 1
        if (-not $static) { $static = Get-ChildItem "$ZINST\lib\*.lib" | Sort-Object Length -Descending | Select-Object -First 1 }
        Copy-Item $static.FullName "$ZINST\lib\zlibstatic.lib" -Force
        Write-Host "normalized static zlib lib: $($static.Name) -> zlibstatic.lib"

    - name: Build tsMuxer
      run: |
        $ErrorActionPreference = "Stop"
        $QT_INSTALL_PATH = "${{ runner.temp }}\qt6-install-x86"
        $ZINST = "${{ runner.temp }}\zlib-install-x86"

        mkdir build
        cd build
        cmake ../ `
          -G Ninja `
          -DCMAKE_PREFIX_PATH="$QT_INSTALL_PATH" `
          -DZLIB_INCLUDE_DIR="$ZINST\include" `
          -DZLIB_LIBRARY="$ZINST\lib\zlibstatic.lib" `
          -DTSMUXER_GUI=ON `
          -DCMAKE_BUILD_TYPE=Release
        if ($LASTEXITCODE -ne 0) { throw "tsMuxer configure failed" }
        cmake --build .
        if ($LASTEXITCODE -ne 0) { throw "tsMuxer build failed" }

        if (!(Test-Path "../bin")) { mkdir "../bin" }
        Copy-Item -Path "tsMuxer/tsmuxer.exe" -Destination "../bin/tsMuxeR.exe" -Force
        if (Test-Path "tsMuxerGUI/tsmuxergui.exe") {
          Copy-Item -Path "tsMuxerGUI/tsmuxergui.exe" -Destination "../bin/tsMuxerGUI.exe" -Force
        }
        cd ..

    - name: Package Build
      run: |
        cd bin
        if (Test-Path "tsMuxerGUI.exe") {
          7z a -y w32.zip tsMuxeR.exe tsMuxerGUI.exe
        } else {
          7z a -y w32.zip tsMuxeR.exe
        }

    - uses: actions/upload-artifact@v4
      with:
        name: tsMuxer-w32
        path: bin/w32.zip
      name: upload-artifact

    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/w32.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
