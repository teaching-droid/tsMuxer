name: Build for Linux

on:
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      name: checkout

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libfreetype-dev zlib1g-dev
      
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.*'
        modules: 'qtmultimedia'
      
    - name: build-for-linux
      run: ./scripts/rebuild_linux_with_gui.sh

    - name: Package
      run: |
        ver="${GITHUB_REF_NAME#v}"
        asset="tsMuxeR-${ver}-linux-x64.zip"
        echo "ASSET=${asset}" >> "$GITHUB_ENV"
        mkdir -p bin
        find build -maxdepth 3 -type f -name tsmuxer    -exec cp {} bin/tsMuxeR \;
        find build -maxdepth 3 -type f -name tsmuxergui -exec cp {} bin/tsMuxerGUI \;
        chmod +x bin/tsMuxeR bin/tsMuxerGUI 2>/dev/null || true
        cd bin
        if [ -f tsMuxerGUI ]; then zip -9 "$asset" tsMuxeR tsMuxerGUI; else zip -9 "$asset" tsMuxeR; fi
        ls -la

    - uses: actions/upload-artifact@v4
      with:
         name: tsMuxer-linux
         path: bin/${{ env.ASSET }}
      name: upload-artefact

    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/${{ env.ASSET }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
